name: Farm Contribution Generator

on:
  schedule:
    # Run daily at 18:00 UTC (03:00 KST)
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/**"
      - ".github/workflows/dragon-contrib.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    name: Generate Farm Contribution SVG

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Generate Farm Contribution SVG
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          THEME: farm
        run: npx ts-node generate-dragon.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet farm-contrib/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config user.name "1hyung"
          git config user.email "dev.1hyung@gmail.com"
          git add farm-contrib/
          git commit -m "Update farm contribution visualization"
          git fetch origin main
          git rebase -X ours origin/main
          git push
