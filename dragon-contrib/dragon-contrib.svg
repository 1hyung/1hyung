<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 850" width="1280" height="850">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="40%" style="stop-color:#2d1408"/>
      <stop offset="100%" style="stop-color:#4a1a0a"/>
    </linearGradient>

    <!-- Lava gradient -->
    <linearGradient id="lavaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc3300"/>
      <stop offset="50%" style="stop-color:#ff4500"/>
      <stop offset="100%" style="stop-color:#cc3300"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="lavaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="850" fill="url(#skyGradient)"/>

  <!-- Volcanoes -->
  <polygon points="0,180 120,60 240,180" fill="#2d1b0e"/>
  <polygon points="200,180 350,30 500,180" fill="#4a3728"/>
  <polygon points="700,180 900,20 1100,180" fill="#2d1b0e"/>
  <polygon points="1050,180 1180,50 1280,180" fill="#4a3728"/>

  <!-- Ground -->
  <rect x="0" y="180" width="1280" height="670" fill="#2d1b0e"/>

  <!-- Lava river -->
  <path d="M0,800 Q200,780 400,800 T800,790 T1200,795 L1280,805 L1280,850 L0,850 Z" fill="url(#lavaGradient)" filter="url(#lavaGlow)"/>

  <!-- Title -->
  <text x="640" y="400" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#ffd700">
    DRAGON CONTRIBUTION LAIR
  </text>

  <!-- Subtitle -->
  <text x="640" y="460" text-anchor="middle" font-family="monospace" font-size="18" fill="#f5deb3">
    Run the workflow to generate dragon contributions
  </text>

  <!-- Placeholder dragon egg -->
  <g transform="translate(590, 500)">
    <ellipse cx="50" cy="60" rx="40" ry="50" fill="#8b4513"/>
    <ellipse cx="50" cy="55" rx="35" ry="42" fill="#a0522d"/>
    <circle cx="35" cy="40" r="5" fill="#daa520"/>
    <circle cx="60" cy="55" r="4" fill="#d2691e"/>
    <circle cx="45" cy="70" r="6" fill="#daa520"/>
    <circle cx="70" cy="45" r="4" fill="#d2691e"/>
  </g>

  <!-- Animated ember -->
  <circle cx="640" cy="600" r="4" fill="#ff6600">
    <animate attributeName="cy" values="600;550;600" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
