<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="sgHeaderSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6d4a6b"/>
      <stop offset="52%" stop-color="#b5746e"/>
      <stop offset="100%" stop-color="#e9a06b"/>
    </linearGradient>
    <radialGradient id="sgHeaderSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2d6"/>
      <stop offset="45%" stop-color="#ffd9a0"/>
      <stop offset="100%" stop-color="#e9a06b" stop-opacity="0"/>
    </radialGradient>
    <filter id="sgTextShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#231410" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- 노을 하늘 -->
  <rect x="0" y="0" width="1200" height="300" fill="url(#sgHeaderSky)"/>
  <!-- 저무는 해 -->
  <circle cx="600" cy="250" r="180" fill="url(#sgHeaderSun)"/>

  <!-- 메사 실루엣 -->
  <path d="M0,250 L0,210 L140,210 L160,190 L320,190 L320,250 Z" fill="#5a3a52" opacity="0.85"/>
  <path d="M880,250 L880,196 L1040,196 L1060,176 L1200,176 L1200,250 Z" fill="#5a3a52" opacity="0.85"/>
  <rect x="0" y="248" width="1200" height="52" fill="#2e1d18"/>
  <rect x="0" y="248" width="1200" height="3" fill="#5c3a2a" opacity="0.8"/>

  <!-- 좌우 사구아로 선인장 -->
  <g opacity="0.92">
    <ellipse cx="72" cy="253" rx="19" ry="5" fill="#231410" opacity="0.4"/>
    <rect x="63" y="149" width="17" height="101" rx="9" fill="#8aa06a"/>
    <rect x="63" y="149" width="6" height="101" rx="3" fill="#b3c48f" opacity="0.8"/>
    <rect x="75" y="149" width="5" height="101" rx="3" fill="#5f7048" opacity="0.8"/>
    <rect x="48" y="189" width="12" height="29" rx="6" fill="#8aa06a"/>
    <rect x="48" y="168" width="12" height="25" rx="6" fill="#8aa06a"/>
    <rect x="83" y="200" width="12" height="27" rx="6" fill="#8aa06a"/>
    <rect x="83" y="176" width="12" height="25" rx="6" fill="#5f7048"/>
    <circle cx="70" cy="146" r="6" fill="#e84a5f"/>
    <circle cx="70" cy="146" r="3" fill="#ff8aa0"/>
  </g>
  <g opacity="0.92">
    <ellipse cx="1128" cy="253" rx="18" ry="5" fill="#231410" opacity="0.4"/>
    <rect x="1120" y="154" width="16" height="96" rx="8" fill="#8aa06a"/>
    <rect x="1120" y="154" width="6" height="96" rx="3" fill="#b3c48f" opacity="0.8"/>
    <rect x="1131" y="154" width="5" height="96" rx="2" fill="#5f7048" opacity="0.8"/>
    <rect x="1106" y="192" width="11" height="28" rx="6" fill="#8aa06a"/>
    <rect x="1106" y="172" width="11" height="24" rx="6" fill="#8aa06a"/>
    <rect x="1139" y="202" width="11" height="26" rx="6" fill="#8aa06a"/>
    <rect x="1139" y="180" width="11" height="24" rx="6" fill="#5f7048"/>
    <circle cx="1126" cy="151" r="6" fill="#e84a5f"/>
    <circle cx="1126" cy="151" r="3" fill="#ff8aa0"/>
  </g>

  <!-- 테두리 -->
  <rect x="0" y="0" width="1200" height="300" fill="none" stroke="#5c3a2a" stroke-width="3" opacity="0.7"/>

  <!-- 메인 타이틀 -->
  <text x="600" y="118" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="34" font-weight="bold" fill="#f0d4c0" filter="url(#sgTextShadow)" letter-spacing="2">
    1HYUNG'S
  </text>
  <text x="600" y="180" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="60" font-weight="bold" fill="#fbeee3" filter="url(#sgTextShadow)" letter-spacing="3">
    SUCCULENT GARDEN
  </text>

  <!-- 서브타이틀 -->
  <text x="600" y="222" text-anchor="middle" font-family="monospace" font-size="16" fill="#f0d4c0" opacity="0.92">
    Where every commit takes root 🌵
  </text>
</svg>