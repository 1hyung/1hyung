<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="1200" height="250">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="250" fill="#0d1117"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="250" fill="none" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <!-- Section Title -->
  <text x="600" y="40" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#ffd700">
    🔥 Experience 🔥
  </text>

  <!-- Company Badge -->
  <rect x="450" y="70" width="300" height="40" rx="8" fill="#d32f2f" opacity="0.8"/>
  <text x="600" y="96" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="18" fill="#ffd700">
    MOVV Corp
  </text>

  <!-- Career Path -->
  <g transform="translate(600, 140)">
    <!-- Backend Engineer -->
    <rect x="-280" y="0" width="180" height="30" rx="6" fill="#2d1b0e" stroke="#ffd700" stroke-width="2"/>
    <text x="-190" y="20" text-anchor="middle" font-family="monospace" font-size="13" fill="#ffd700">Backend Engineer</text>

    <!-- Arrow -->
    <text x="-90" y="20" text-anchor="middle" font-family="monospace" font-size="16" fill="#ffd700">→</text>

    <!-- QA Engineer -->
    <rect x="-60" y="0" width="140" height="30" rx="6" fill="#2d1b0e" stroke="#FF6B6B" stroke-width="2"/>
    <text x="10" y="20" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF6B6B">QA Engineer</text>

    <!-- Arrow -->
    <text x="90" y="20" text-anchor="middle" font-family="monospace" font-size="16" fill="#ffd700">→</text>

    <!-- Prompt Engineer -->
    <rect x="120" y="0" width="160" height="30" rx="6" fill="#2d1b0e" stroke="#b678c4" stroke-width="2"/>
    <text x="200" y="20" text-anchor="middle" font-family="monospace" font-size="13" fill="#b678c4">Prompt Engineer</text>
  </g>

  <!-- Period -->
  <text x="600" y="210" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e">
    2025.06 ~ Present
  </text>
</svg>